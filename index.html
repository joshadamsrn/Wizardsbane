<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wizard's Bane</title>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      font-family: system-ui, sans-serif;
    }
    #viewer {
      height: 100vh;
      width: 100vw;
      background: white;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0,0,0,.85);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">Loading book…</div>
  <div id="viewer"></div>

  <script>
    const status = document.getElementById("status");

    async function loadBook() {
      try {
        const response = await fetch("./wizards-bane.epub", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("EPUB fetch failed: " + response.status + " " + response.statusText);
        }

        status.textContent = "Opening book…";

        const arrayBuffer = await response.arrayBuffer();
        const book = ePub(arrayBuffer);

        const rendition = book.renderTo("viewer", {
          width: "100%",
          height: "100%"
        });

        await rendition.display();

        status.textContent = "Book loaded";
        setTimeout(() => {
          status.style.display = "none";
        }, 1200);
      } catch (err) {
        console.error(err);
        status.textContent = "Error: " + err.message;
      }
    }

    loadBook();
  </script>
</body>
</html>
