<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Wizard's Bane</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #viewer {
      position: absolute;
      top: 56px;
      bottom: 56px;
      left: 0;
      right: 0;
      background: white;
    }

    #topbar, #bottombar {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(20,20,20,.95);
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      box-sizing: border-box;
    }

    #topbar {
      top: 0;
      height: 56px;
    }

    #bottombar {
      bottom: 0;
      height: 56px;
      justify-content: space-between;
    }

    .btn {
      background: #2c2c2c;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .btn:active {
      opacity: 0.8;
    }

    #title {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #status {
      position: fixed;
      top: 66px;
      left: 10px;
      right: 10px;
      z-index: 10000;
      background: rgba(0,0,0,.8);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    #tap-left, #tap-right {
      position: absolute;
      top: 56px;
      bottom: 56px;
      width: 25%;
      z-index: 5000;
    }

    #tap-left { left: 0; }
    #tap-right { right: 0; }

    #progress {
      font-size: 13px;
      opacity: 0.9;
      min-width: 90px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <button class="btn" id="prevBtn">◀</button>
    <div id="title">Wizard's Bane</div>
    <button class="btn" id="bookmarkBtn">Bookmark</button>
    <button class="btn" id="goBookmarkBtn">Go to Mark</button>
  </div>

  <div id="status">Loading book…</div>
  <div id="viewer"></div>
  <div id="tap-left"></div>
  <div id="tap-right"></div>

  <div id="bottombar">
    <button class="btn" id="saveBtn">Save Spot</button>
    <button class="btn" id="resumeBtn">Resume</button>
    <div id="progress">0%</div>
    <button class="btn" id="nextBtn">▶</button>
  </div>

  <script>
    const status = document.getElementById("status");
    const progressEl = document.getElementById("progress");

    const STORAGE_KEY = "wizards-bane-last-location";
    const BOOKMARK_KEY = "wizards-bane-bookmark";

    let book;
    let rendition;
    let locationsReady = false;

    async function loadBook() {
      try {
        const response = await fetch("./wizards-bane.epub", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("EPUB fetch failed: " + response.status + " " + response.statusText);
        }

        status.textContent = "Opening book…";

        const arrayBuffer = await response.arrayBuffer();
        book = ePub(arrayBuffer);

        rendition = book.renderTo("viewer", {
          width: "100%",
          height: "100%",
          flow: "paginated",
          spread: "none"
        });

        const savedLocation = localStorage.getItem(STORAGE_KEY);
        await rendition.display(savedLocation || undefined);

        await book.ready;
        await book.locations.generate(1000);
        locationsReady = true;

        rendition.on("relocated", (location) => {
          const cfi = location.start.cfi;
          localStorage.setItem(STORAGE_KEY, cfi);

          if (locationsReady) {
            const percent = book.locations.percentageFromCfi(cfi);
            progressEl.textContent = Math.round(percent * 100) + "%";
          }
        });

        status.textContent = "Book loaded";
        setTimeout(() => {
          status.style.display = "none";
        }, 1200);

      } catch (err) {
        console.error(err);
        status.textContent = "Error: " + err.message;
      }
    }

    function showStatus(message) {
      status.textContent = message;
      status.style.display = "block";
      setTimeout(() => {
        status.style.display = "none";
      }, 1200);
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      if (rendition) rendition.next();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      if (rendition) rendition.prev();
    });

    document.getElementById("tap-right").addEventListener("click", () => {
      if (rendition) rendition.next();
    });

    document.getElementById("tap-left").addEventListener("click", () => {
      if (rendition) rendition.prev();
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const current = localStorage.getItem(STORAGE_KEY);
      if (current) {
        localStorage.setItem(STORAGE_KEY, current);
        showStatus("Spot saved");
      }
    });

    document.getElementById("resumeBtn").addEventListener("click", async () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved && rendition) {
        await rendition.display(saved);
        showStatus("Resumed");
      }
    });

    document.getElementById("bookmarkBtn").addEventListener("click", () => {
      const current = localStorage.getItem(STORAGE_KEY);
      if (current) {
        localStorage.setItem(BOOKMARK_KEY, current);
        showStatus("Bookmark saved");
      }
    });

    document.getElementById("goBookmarkBtn").addEventListener("click", async () => {
      const bookmark = localStorage.getItem(BOOKMARK_KEY);
      if (bookmark && rendition) {
        await rendition.display(bookmark);
        showStatus("Opened bookmark");
      } else {
        showStatus("No bookmark saved");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (!rendition) return;
      if (e.key === "ArrowRight") rendition.next();
      if (e.key === "ArrowLeft") rendition.prev();
    });

    loadBook();
  </script>
</body>
</html>
